schema_version: 1

context:
  name: diffusers
  version: "0.38.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/diffusers-${{ version }}.tar.gz
  sha256: 1e094ec5c16f18c42fb89d37f07a94cf9aab3ebbe527ab059c609597b8857626

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - importlib-metadata
    - filelock
    - httpx <1.0.0
    - huggingface_hub >=0.34.0,<2.0
    - numpy
    - regex !=2019.12.17
    - requests
    - safetensors >=0.8.0
    - pillow

tests:
  - python:
      imports:
        - diffusers
        - diffusers.models
      pip_check: true
      python_version:
        - ${{ python_min }}
        - '*'

about:
  summary: Diffusers
  license: Apache-2.0
  license_file: LICENSE
  description: |
    :hugs: Diffusers provides pretrained diffusion models across multiple modalities,
    such as vision and audio, and serves as a modular toolbox for inference and
    training of diffusion models.

    PyPI: [https://pypi.org/project/diffusers/](https://pypi.org/project/diffusers/)

  homepage: https://github.com/huggingface/diffusers
  repository: https://github.com/huggingface/diffusers
  documentation: https://github.com/huggingface/diffusers

extra:
  recipe-maintainers:
    - mukhery
    - sugatoray
    - xhochy
    # maintainers from upstream repo
    - anton-l
    - patrickvonplaten
